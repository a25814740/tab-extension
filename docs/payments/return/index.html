<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>付款完成</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: radial-gradient(1200px 800px at 30% 10%, #1f2a52, #0b1020 60%, #070b16 100%);
        color: #e2e8f0;
      }
      .wrap {
        max-width: 520px;
        margin: 0 auto;
        padding: 56px 20px;
      }
      .card {
        background: rgba(15, 23, 42, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        font-size: 13px;
        line-height: 1.7;
        color: #94a3b8;
      }
      .btn {
        margin-top: 16px;
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 16px;
        border-radius: 12px;
        border: 0;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-primary { background: #f43f5e; color: #fff; }
      .btn-secondary { background: transparent; color: #e2e8f0; border: 1px solid rgba(148, 163, 184, 0.35); }
      .hint { margin-top: 12px; font-size: 12px; color: #cbd5f5; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>付款完成</h1>
        <p>系統正在處理你的訂單，通常幾秒內就會同步到擴充套件。</p>
        <p>你可以回到 Taboard｜分頁與書籤儀錶板查看方案狀態，或直接關閉這個分頁。</p>
        <button class="btn btn-primary" type="button" onclick="window.close()">關閉此分頁</button>
        <button class="btn btn-secondary" type="button" onclick="location.href='/'">回到首頁</button>
        <div class="hint">若同步仍未更新，請在擴充套件裡手動重新整理一次。</div>
      </div>
    </div>
  </body>
</html>
